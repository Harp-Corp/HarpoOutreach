name: Build HarpoOutreach

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Sync new Swift files into Xcode project
        run: python3 .github/scripts/sync_pbxproj.py

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: build
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Resolve dependencies
        run: |
          xcodebuild -project HarpoOutreach.xcodeproj \
            -scheme HarpoOutreach \
            -resolvePackageDependencies 2>&1 || true

      - name: Build app (strict mode)
        run: |
          set -o pipefail
          xcodebuild -project HarpoOutreach.xcodeproj \
            -scheme HarpoOutreach \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            build 2>&1 | tee build.log

      - name: Check for compiler errors
        if: always()
        run: |
          echo "## Compiler Analysis" >> $GITHUB_STEP_SUMMARY
          ERROR_COUNT=$(grep -c "error:" build.log 2>/dev/null || true)
          ERROR_COUNT=${ERROR_COUNT:-0}
          WARNING_COUNT=$(grep -c "warning:" build.log 2>/dev/null || true)
          WARNING_COUNT=${WARNING_COUNT:-0}
          echo "- Errors: $ERROR_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: $WARNING_COUNT" >> $GITHUB_STEP_SUMMARY
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep "error:" build.log | head -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Warnings (first 15)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep "warning:" build.log | head -15 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
